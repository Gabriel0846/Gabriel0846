name: "Atualizar Estatísticas do README"

on:
  schedule:
    - cron: "0 0 * * *" # Executa automaticamente uma vez por dia
  workflow_dispatch: # Permite executar manualmente

jobs:
  build:
    name: "Gerar Cartões SVG"
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permite que o workflow faça commit dos arquivos gerados

    steps:
      - name: "1. Clonar o repositório"
        uses: actions/checkout@v4

      - name: "2. Gerar card de estatísticas gerais"
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Gabriel0846&show_icons=true&count_private=true&bg_color=0d1117&title_color=ff0000&icon_color=ff0000&text_color=c9d1d9
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "3. Gerar card de linguagens mais usadas"
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Gabriel0846&layout=compact&langs_count=8&bg_color=0d1117&title_color=ff0000&text_color=c9d1d9
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "4. Confirmar e enviar os novos arquivos SVG"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Atualizar estatísticas do perfil" || exit 0
          git push
